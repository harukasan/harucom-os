# Harucom OS environment variables.
# Loaded at boot by /system.rb and exposed via ENV[].
#
# KEYBOARD_LAYOUT: keyboard layout name, passed to Keyboard.use_layout.
#                  Available: us, jis.
KEYBOARD_LAYOUT: us
# CONSOLE_ZOOM: text console pixel scaling at boot. 2 starts with a 53x18
#               grid scaled 2x (320x240); any other value keeps 640x480
#               (106x37). The zoom command and Ctrl-Shift-= change it at
#               runtime.
CONSOLE_ZOOM: 1

name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install ARM toolchain and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi libfreetype-dev

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '4.0.1'

    - name: Install Ruby gems
      run: |
        bundle config set --local path ${{github.workspace}}/.bundle
        bundle install

    - name: Debug gem environment
      run: |
        echo "=== .bundle/config ==="
        cat .bundle/config
        echo "=== bundle info freetype ==="
        bundle info freetype || true
        echo "=== gem environment ==="
        gem environment
        echo "=== which ruby / bundle / rake ==="
        which ruby bundle rake
        echo "=== ls .bundle/ ==="
        ls -la .bundle/ || true
        ls .bundle/ruby/ || true
        ls .bundle/ruby/4.0.0/gems/ || true
        echo "=== BUNDLE_GEMFILE test from lib/picoruby ==="
        cd lib/picoruby && BUNDLE_GEMFILE=${{github.workspace}}/Gemfile bundle exec ruby -e "puts 'bundler OK'; puts Gem.path.inspect"

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --parallel

    - name: Upload artifacts
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: harucom_os
        path: |
          ${{github.workspace}}/build/*.uf2
          ${{github.workspace}}/build/*.elf

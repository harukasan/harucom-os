<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Harucom OS (wasm)</title>
  <!-- style.css is built from css/app.css by `rake wasm:css` (Tailwind v4). -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="m-6 bg-base font-sans text-fg">
  <h1 class="text-[1.1rem]">Harucom OS (wasm)</h1>
  <!-- #screen is the Engine-owned DVI canvas; #app is the funicular Shell mount
       point (Console / KbdDebug / Pads), a sibling of the canvas. -->
  <canvas id="screen" width="640" height="480"></canvas>
  <div id="app"></div>

  <!-- harucom.js (classic script) defines the global createHarucomModule factory;
       main.js (ES module) boots the VM, exposes the bridge, and starts the UI. -->
  <script src="harucom.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>

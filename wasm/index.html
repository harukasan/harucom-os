<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Harucom OS (wasm)</title>
  <style>
    body { font-family: sans-serif; margin: 1.5rem; background: #111; color: #eee; }
    h1 { font-size: 1.1rem; }
    /* The DVI text surface is 640x480; scale it up with crisp (nearest) pixels. */
    #screen { width: 640px; height: 480px; image-rendering: pixelated;
              background: #000; border-radius: 4px; display: block; }
    #out { background: #000; color: #0f0; padding: 1rem; border-radius: 4px;
           white-space: pre-wrap; font-family: "Source Code Pro", monospace;
           min-height: 4rem; margin-top: 1rem; }
    #kbddbg { color: #888; font-family: monospace; font-size: 0.8rem;
              margin-top: 0.5rem; min-height: 1rem; }
    #pads { display: flex; gap: 2rem; margin-top: 0.5rem; }
    .pad { display: grid; grid-template-columns: repeat(3, 2.4rem);
           grid-auto-rows: 2.4rem; gap: 2px; }
    .pad-title { color: #888; font: 0.8rem monospace; grid-column: 1 / -1; }
    .padbtn { font-size: 1.1rem; background: #333; color: #eee;
              border: 1px solid #555; border-radius: 4px; cursor: pointer;
              user-select: none; touch-action: none; }
    .padbtn.on { background: #0a0; }
  </style>
</head>
<body>
  <h1>Harucom OS (wasm): Phase 2 (DVI text on canvas)</h1>
  <canvas id="screen" width="640" height="480"></canvas>
  <div id="kbddbg"></div>
  <div id="pads"></div>
  <pre id="out"></pre>

  <script src="harucom.js"></script>
  <script>
    const outEl = document.getElementById("out");
    const append = (s) => { outEl.textContent += s; };

    // RGB332 (bits 7-5 R, 4-2 G, 1-0 B) -> RGBA lookup. Stored as little-endian
    // Uint32 (0xAABBGGRR) so it can be written straight into the ImageData view.
    const rgb332 = new Uint32Array(256);
    for (let c = 0; c < 256; c++) {
      const r = Math.round(((c >> 5) & 7) * 255 / 7);
      const g = Math.round(((c >> 2) & 7) * 255 / 7);
      const b = Math.round((c & 3) * 255 / 3);
      rgb332[c] = (0xFF << 24) | (b << 16) | (g << 8) | r;
    }

    // stdout / stderr arrive via the posix hal_write() (emscripten fd 1 / 2),
    // which emscripten routes to Module.print / Module.printErr.
    createHarucomModule({
      print: (s) => append(s + "\n"),
      printErr: (s) => append(s + "\n"),
    }).then((Module) => {
      if (Module._harucom_init() !== 0) {
        append("\n[harucom_init failed]\n");
        return;
      }

      // The framebuffer is a static C array, so its address is stable across
      // memory growth; fetch it once. HEAPU8 itself may be replaced on growth,
      // so it is re-read every frame.
      const W = Module._harucom_dvi_width();
      const H = Module._harucom_dvi_height();
      const fbPtr = Module._harucom_dvi_framebuffer();
      const canvas = document.getElementById("screen");
      const ctx = canvas.getContext("2d");
      const image = ctx.createImageData(W, H);
      const pixels = new Uint32Array(image.data.buffer);

      function blit() {
        const fb = Module.HEAPU8;
        for (let i = 0; i < W * H; i++) pixels[i] = rgb332[fb[fbPtr + i]];
        ctx.putImageData(image, 0, 0);
      }

      // Drive the mruby task scheduler from requestAnimationFrame.
      //
      // Clock: advance mrb_tick_wasm to match real elapsed time at MRB_TICK_UNIT
      // (4ms) granularity, about 4 ticks per 60fps frame. Sleeping tasks only
      // wake on ticks, so this keeps sleep_ms / DVI.wait_vsync real-time-accurate
      // and lets the line editor wake every frame (ticking only once per frame
      // made sleep_ms 16 take ~4 frames, so input and redraw lagged at ~15fps).
      // The catch-up is capped so returning from a background tab, where rAF was
      // paused, does not replay a long backlog of ticks at once.
      //
      // Steps: run a batch of task slices so the always-ready keyboard task polls
      // every frame and any woken task runs to its next yield. More steps beyond
      // draining the ready queue does not help smoothness (the work tasks are
      // gated by the clock, not the step count) and only spins the Task.pass
      // loops. applyReleases() then drops keys released this frame, after the
      // batch polled them, so a same-frame key down+up is still seen once.
      const MRB_TICK_UNIT = 4;     // ms per tick; must match build_config/harucom-wasm.rb
      const MAX_CATCHUP_TICKS = 8; // cap clock catch-up after a stall / background tab
      const STEPS_PER_FRAME = 16;
      let lastFrame = -1;
      let audioPump = null;        // set once the AudioContext starts (see startAudio)
      let lastTick = performance.now();
      function step() {
        const now = performance.now();
        let ticks = 0;
        while (now - lastTick >= MRB_TICK_UNIT && ticks < MAX_CATCHUP_TICKS) {
          Module._mrb_tick_wasm();
          lastTick += MRB_TICK_UNIT;
          ticks++;
        }
        if (now - lastTick >= MRB_TICK_UNIT) lastTick = now; // fell too far behind; resync
        for (let s = 0; s < STEPS_PER_FRAME; s++) Module._mrb_run_step();
        applyReleases();
        if (audioPump) audioPump(); // refill the audio buffer from the synth ring
        const frame = Module._harucom_dvi_frame_count();
        if (frame !== lastFrame) {
          lastFrame = frame;
          blit();
        }
        requestAnimationFrame(step);
      }
      requestAnimationFrame(step);

      // --- Keyboard: DOM key events -> HID usage codes -> wasm ---------------
      // Map KeyboardEvent.code to USB HID keyboard usage IDs (the codes a real
      // USB keyboard reports) and modifier keys to the HID modifier bitmask. The
      // wasm USB host port (usb_host_wasm.c) holds this state and the Keyboard
      // class reads it through USB::Host, so the text-input pipeline matches the
      // board. The OS does its own key repeat from held state, so browser
      // auto-repeat keydowns for an already-held key are harmless no-ops.
      const HID = {
        KeyA:0x04,KeyB:0x05,KeyC:0x06,KeyD:0x07,KeyE:0x08,KeyF:0x09,KeyG:0x0A,
        KeyH:0x0B,KeyI:0x0C,KeyJ:0x0D,KeyK:0x0E,KeyL:0x0F,KeyM:0x10,KeyN:0x11,
        KeyO:0x12,KeyP:0x13,KeyQ:0x14,KeyR:0x15,KeyS:0x16,KeyT:0x17,KeyU:0x18,
        KeyV:0x19,KeyW:0x1A,KeyX:0x1B,KeyY:0x1C,KeyZ:0x1D,
        Digit1:0x1E,Digit2:0x1F,Digit3:0x20,Digit4:0x21,Digit5:0x22,
        Digit6:0x23,Digit7:0x24,Digit8:0x25,Digit9:0x26,Digit0:0x27,
        Enter:0x28,Escape:0x29,Backspace:0x2A,Tab:0x2B,Space:0x2C,
        Minus:0x2D,Equal:0x2E,BracketLeft:0x2F,BracketRight:0x30,Backslash:0x31,
        Semicolon:0x33,Quote:0x34,Backquote:0x35,Comma:0x36,Period:0x37,Slash:0x38,
        CapsLock:0x39,
        F1:0x3A,F2:0x3B,F3:0x3C,F4:0x3D,F5:0x3E,F6:0x3F,
        F7:0x40,F8:0x41,F9:0x42,F10:0x43,F11:0x44,F12:0x45,
        Insert:0x49,Home:0x4A,PageUp:0x4B,Delete:0x4C,End:0x4D,PageDown:0x4E,
        ArrowRight:0x4F,ArrowLeft:0x50,ArrowDown:0x51,ArrowUp:0x52,
        IntlRo:0x87,IntlYen:0x89,
      };
      const MOD = {
        ControlLeft:0x01,ShiftLeft:0x02,AltLeft:0x04,MetaLeft:0x08,
        ControlRight:0x10,ShiftRight:0x20,AltRight:0x40,MetaRight:0x80,
      };

      const held = [];   // HID usages currently down, in press order (max 6)
      let modifier = 0;  // HID modifier bitmask
      const pendingRelease = new Set(); // keyups waiting for a poll before removal
      function pushKeyState() {
        Module._harucom_kbd_set_state(modifier,
          held[0]||0, held[1]||0, held[2]||0, held[3]||0, held[4]||0, held[5]||0);
      }
      // Apply deferred key releases. Called once per frame after the scheduler
      // batch has run, so a key that went down and up within one frame is still
      // present in the report while the keyboard task polls, then removed.
      function applyReleases() {
        if (pendingRelease.size === 0) return;
        for (const usage of pendingRelease) {
          const i = held.indexOf(usage);
          if (i >= 0) held.splice(i, 1);
        }
        pendingRelease.clear();
        pushKeyState();
      }

      canvas.tabIndex = 0;          // focusable, for a visible focus target
      canvas.style.outline = "none";
      canvas.focus();
      canvas.addEventListener("mousedown", () => canvas.focus());

      // Resolve a DOM key event to a HID usage. Keyed on e.code, but fall back
      // to e.key for the space bar: some browsers / IME states report its code
      // as something other than "Space", while e.key is always " ".
      function usageFor(e) {
        let u = HID[e.code];
        if (u === undefined && e.key === " ") u = 0x2C;
        return u;
      }

      const dbg = document.getElementById("kbddbg");
      function showDbg(e, usage, prevented) {
        if (!dbg) return;
        const hex = (u) => "0x" + u.toString(16);
        dbg.textContent =
          `last key: code=${e.code || "(none)"} key=${JSON.stringify(e.key)} ` +
          `usage=${usage === undefined ? "-" : hex(usage)} prevented=${prevented} ` +
          `held=[${held.map(hex).join(",")}] mod=${hex(modifier)}`;
      }

      function onKeyDown(e) {
        if (e.code in MOD) { modifier |= MOD[e.code]; pushKeyState(); showDbg(e, undefined, false); return; }
        const usage = usageFor(e);
        if (usage === undefined) { showDbg(e, undefined, false); return; }
        // Capture keys for the OS so the browser does not steal its shortcuts
        // (the OS uses Ctrl-J for SKK, Ctrl-C/D/L, etc. — Firefox would otherwise
        // open Downloads on Ctrl-J). Leave Meta/Cmd combos and the function keys
        // to the browser so it keeps usable escapes (F5 reload, F12 devtools,
        // macOS Cmd-* shortcuts); the OS still receives them via the report.
        const isFunctionKey = usage >= 0x3A && usage <= 0x45; // F1..F12
        let prevented = false;
        if (!e.metaKey && !isFunctionKey) { e.preventDefault(); prevented = true; }
        pendingRelease.delete(usage); // re-pressed before its release was applied
        if (!held.includes(usage) && held.length < 6) held.push(usage);
        pushKeyState();
        showDbg(e, usage, prevented);
      }
      function onKeyUp(e) {
        if (e.code in MOD) { modifier &= ~MOD[e.code]; pushKeyState(); return; }
        const usage = usageFor(e);
        if (usage === undefined) return;
        // Defer removal to applyReleases so a same-frame down+up is still polled.
        pendingRelease.add(usage);
      }
      // Listen on window in the capture phase so keys reach the OS regardless of
      // which element currently holds focus (and so space never scrolls the page).
      window.addEventListener("keydown", onKeyDown, true);
      window.addEventListener("keyup", onKeyUp, true);

      // --- Audio: PWMAudio synth ring buffer -> Web Audio ------------------
      // The synth renders into a small 1024-frame ring (filled by the Ruby
      // PWMAudio.update loop). The audio callback runs on the same (busy) main
      // thread as the VM, so pulling straight from that small ring glitched
      // whenever a frame ran long, and any sample-rate mismatch dropped a frame
      // at each callback boundary. Instead the rAF loop pumps the synth ring into
      // a larger JS ring (audioPump), and the ScriptProcessor drains the JS ring
      // with a continuous fractional read position (so resampling never skips a
      // frame). The JS ring plus a larger block absorb frame-time jitter without
      // needing a SharedArrayBuffer / AudioWorklet (no cross-origin headers). The
      // AudioContext is created lazily on the first user gesture.
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      let audioCtx = null, audioNode = null; // kept alive so the node is not GC'd
      function startAudio() {
        if (audioCtx || !AudioCtx) return;
        const srcRate = Module._harucom_audio_sample_rate(); // 22050
        // Request the synth rate so no resampling is needed when honored.
        try { audioCtx = new AudioCtx({ sampleRate: srcRate }); }
        catch (e) { audioCtx = new AudioCtx(); }
        const ctx = audioCtx;
        const ratio = srcRate / ctx.sampleRate; // source frames per output frame

        const JS_CAP = 8192, MASK = JS_CAP - 1; // JS ring, power of 2
        const jsL = new Float32Array(JS_CAP), jsR = new Float32Array(JS_CAP);
        let jsWr = 0;       // producer index (source frames written)
        let readPos = 0;    // consumer index (fractional source frames consumed)
        const TARGET = 1024; // source frames to keep buffered (~46ms at 22050)
        const PULL = 1024;
        const lPtr = Module._malloc(PULL * 4), rPtr = Module._malloc(PULL * 4);

        // Pull from the synth ring into the JS ring, keeping ~TARGET buffered.
        audioPump = function () {
          let want = TARGET - (jsWr - Math.floor(readPos));
          while (want > 0) {
            const n = want < PULL ? want : PULL;
            const got = Module._harucom_audio_pull(lPtr, rPtr, n);
            if (got === 0) break; // synth ring empty; the producer refills it
            const H = Module.HEAPF32, lo = lPtr >> 2, ro = rPtr >> 2;
            for (let i = 0; i < got; i++) {
              jsL[jsWr & MASK] = H[lo + i];
              jsR[jsWr & MASK] = H[ro + i];
              jsWr++;
            }
            want -= got;
            if (got < n) break;
          }
        };

        const BLOCK = 2048; // larger block = bigger output buffer to ride jitter
        const node = ctx.createScriptProcessor(BLOCK, 0, 2);
        audioNode = node;
        node.onaudioprocess = (e) => {
          const outL = e.outputBuffer.getChannelData(0);
          const outR = e.outputBuffer.getChannelData(1);
          for (let i = 0; i < BLOCK; i++) {
            const idx = Math.floor(readPos);
            if (idx < jsWr) {
              const s = idx & MASK;
              outL[i] = jsL[s];
              outR[i] = jsR[s];
              readPos += ratio; // fractional, carried across callbacks
            } else {
              outL[i] = 0; outR[i] = 0; // underrun: hold position, emit silence
            }
          }
        };
        node.connect(ctx.destination);
        ctx.resume();
      }
      canvas.addEventListener("mousedown", startAudio);
      window.addEventListener("keydown", startAudio, true);

      // --- ADC pads: on-screen D-pads -> resistor-ladder value -> wasm -----
      // The board has two resistor-ladder pads read over ADC (Board::Pad). Each
      // on-screen D-pad button maps to a direction; the pressed set is converted
      // to the ADC value the ladder would produce (parallel resistance), matching
      // Board::Pad's calibration table so its decode returns the right buttons.
      const PAD_CAL = [2000, 2760, 3300, 3646]; // single RIGHT/UP/DOWN/LEFT raw
      const PAD_G = PAD_CAL.map((c) => 4095 / c - 1);
      function padRaw(mask) {
        if (!mask) return 4095; // idle: pulled to 3V3
        let s = 0;
        for (let i = 0; i < 4; i++) if (mask & (1 << i)) s += PAD_G[i];
        return Math.round(4095 / (s + 1));
      }
      const padMask = [0, 0];
      function setPadButton(pad, dir, down) {
        if (down) padMask[pad] |= (1 << dir);
        else padMask[pad] &= ~(1 << dir);
        Module._harucom_pad_set(pad, padRaw(padMask[pad]));
      }
      const padsEl = document.getElementById("pads");
      if (padsEl) {
        // dir constants: RIGHT=0, UP=1, DOWN=2, LEFT=3; arranged as a cross.
        const LAYOUT = [
          { label: "↑", dir: 1, col: 2, row: 1 }, // up
          { label: "←", dir: 3, col: 1, row: 2 }, // left
          { label: "→", dir: 0, col: 3, row: 2 }, // right
          { label: "↓", dir: 2, col: 2, row: 3 }, // down
        ];
        for (let pad = 0; pad < 2; pad++) {
          const grid = document.createElement("div");
          grid.className = "pad";
          const title = document.createElement("div");
          title.className = "pad-title";
          title.textContent = "PAD" + pad;
          grid.appendChild(title);
          LAYOUT.forEach((b) => {
            const btn = document.createElement("button");
            btn.className = "padbtn";
            btn.textContent = b.label;
            btn.style.gridColumn = String(b.col);
            btn.style.gridRow = String(b.row + 1); // row 1 is the title
            const press = (e) => {
              e.preventDefault();
              startAudio(); // a pad tap is a user gesture too
              setPadButton(pad, b.dir, true);
              btn.classList.add("on");
            };
            const release = (e) => {
              e.preventDefault();
              setPadButton(pad, b.dir, false);
              btn.classList.remove("on");
            };
            btn.addEventListener("pointerdown", press);
            btn.addEventListener("pointerup", release);
            btn.addEventListener("pointerleave", release);
            btn.addEventListener("pointercancel", release);
            grid.appendChild(btn);
          });
          padsEl.appendChild(grid);
        }
      }
    });
  </script>
</body>
</html>
